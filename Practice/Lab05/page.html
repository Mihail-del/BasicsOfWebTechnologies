<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Task 6 — CRUD нотаток</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 560px; margin: 2rem auto; padding: 1rem; line-height: 1.5; }
    h1 { color: #2050a0; }
    form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    form input { flex: 1; padding: 8px; border: 1px solid #ccd; border-radius: 4px; }
    form button { padding: 8px 16px; background: #2050a0; color: white; border: none; border-radius: 4px; cursor: pointer; }
    #status { color: #888; font-size: 0.9em; min-height: 1.2em; }
    #todos { list-style: none; padding: 0; }
    #todos li { display: flex; align-items: center; gap: 8px; padding: 8px; border-bottom: 1px solid #eee; }
    #todos li.completed .title { text-decoration: line-through; color: #888; }
    #todos .title { flex: 1; }
    #todos .delete { background: transparent; border: none; cursor: pointer; color: #c33; font-size: 1.2rem; }
    button:disabled { opacity: 0.6; cursor: wait; }
  </style>
</head>
<body>

  <h1>Менеджер нотаток</h1>

  <form id="new-todo">
    <input name="title" placeholder="Нова задача" required>
    <button type="submit">Додати</button>
  </form>

  <p id="status"></p>

  <ul id="todos"></ul>

  <script src="crud.js"></script>
</body>
</html>
